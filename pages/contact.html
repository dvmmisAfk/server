<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LaundryLux - Contact</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #ffffff;
        }

        header {
            background-color: #f2f2f2;
            padding: 12px 0;
            text-align: center;
            font-size: 16px;
            color: #333;
            border-bottom: 1px solid #ddd;
        }

        nav {
            background-color: #222;
            display: flex;
            justify-content: center;
            gap: 30px;
            padding: 10px 0;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            font-size: 14px;
            letter-spacing: 0.05em;
        }

        nav a:hover { color: #f0c040; }

        .main {
            max-width: 500px;
            margin: 60px auto;
            padding: 0 20px;
        }

        h2 {
            font-size: 20px;
            margin-bottom: 20px;
            color: #222;
        }

        .form-group {
            margin-bottom: 14px;
        }

        label {
            display: block;
            font-size: 13px;
            color: #444;
            margin-bottom: 5px;
        }

        input, textarea {
            width: 100%;
            padding: 7px 10px;
            font-size: 14px;
            border: 1px solid #ccc;
            outline: none;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        textarea {
            height: 100px;
            resize: vertical;
        }

        button {
            padding: 8px 20px;
            font-size: 14px;
            background-color: #d3d3d3;
            border: 1px solid #bdbdbd;
            cursor: pointer;
            margin-top: 6px;
        }

        button:hover { background-color: #c7c7c7; }

        #formMsg {
            margin-top: 12px;
            font-size: 13px;
            color: green;
            display: none;
        }

        .info {
            margin-top: 40px;
            font-size: 13px;
            color: #666;
            line-height: 2;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }
    </style>
</head>
<body>

    <header>Contact Us — LaundryLux</header>

    <nav>
        <a href="/home">Home</a>
        <a href="/about">About</a>
        <a href="/contact">Contact</a>
        <a href="/services">Services</a>
    </nav>

    <div class="main">
        <h2>Get in Touch</h2>

        <!-- Contact Form with DOM validation -->
        <div class="form-group">
            <label for="cName">Your Name</label>
            <input type="text" id="cName" placeholder="e.g. Rahul Sharma" />
        </div>
        <div class="form-group">
            <label for="cEmail">Email Address</label>
            <input type="email" id="cEmail" placeholder="you@example.com" />
        </div>
        <div class="form-group">
            <label for="cMsg">Message</label>
            <textarea id="cMsg" placeholder="How can we help you?"></textarea>
        </div>
        <button onclick="submitForm()">Send Message</button>
        <p id="formMsg">✔ Message sent! We'll get back to you soon.</p>

        <!-- Static contact info -->
        <div class="info">
            <strong>📍 Address:</strong> 12, Civil Lines, Lucknow, UP — 226001<br>
            <strong>📞 Phone:</strong> +91 98765 43210<br>
            <strong>📧 Email:</strong> support@laundrylux.in<br>
            <strong>⏰ Hours:</strong> Mon–Sat, 8 AM – 8 PM
        </div>
    </div>

    <script>
        // Basic form validation using DOM manipulation
        function submitForm() {
            const name  = document.getElementById("cName").value.trim();
            const email = document.getElementById("cEmail").value.trim();
            const msg   = document.getElementById("cMsg").value.trim();
            const feedback = document.getElementById("formMsg");

            if (name === "" || email === "" || msg === "") {
                alert("Please fill in all fields before submitting.");
                return;
            }

            // Show success message dynamically
            feedback.style.display = "block";
        }
    </script>

</body>
</html>
