<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LaundryLux - Home</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #ffffff;
        }

        /* Header */
        header {
            background-color: #f2f2f2;
            padding: 12px 0;
            text-align: center;
            font-size: 16px;
            color: #333;
            border-bottom: 1px solid #ddd;
        }

        /* Navigation */
        nav {
            background-color: #222;
            display: flex;
            justify-content: center;
            gap: 30px;
            padding: 10px 0;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            font-size: 14px;
            letter-spacing: 0.05em;
        }

        nav a:hover {
            color: #f0c040;
        }

        /* Main Content */
        .main {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 80px;
        }

        /* Boxes */
        .boxes {
            display: flex;
            gap: 30px;
            margin-bottom: 60px;
        }

        .box {
            width: 90px;
            height: 90px;
            border: 1px solid #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #777;
            cursor: pointer;
            user-select: none;
        }

        /* Input Section */
        .input-section {
            display: flex;
            gap: 10px;
        }

        input {
            padding: 6px 10px;
            font-size: 14px;
            border: 1px solid #ccc;
            outline: none;
        }

        button {
            padding: 6px 16px;
            font-size: 14px;
            background-color: #d3d3d3;
            border: 1px solid #bdbdbd;
            cursor: pointer;
        }

        button:hover {
            background-color: #c7c7c7;
        }
    </style>
</head>

<body>

    <!-- Header with dynamic greeting -->
    <header id="greeting">
        Hello
    </header>

    <!-- Navigation Links -->
    <nav>
        <a href="/home">Home</a>
        <a href="/about">About</a>
        <a href="/contact">Contact</a>
        <a href="/services">Services</a>
    </nav>

    <!-- Content -->
    <div class="main">

        <!-- Color Boxes (DOM Interaction) -->
        <div class="boxes">
            <div class="box" onclick="fillColor(this)">Red</div>
            <div class="box" onclick="fillColor(this)">Blue</div>
            <div class="box" onclick="fillColor(this)">Green</div>
            <div class="box" onclick="fillColor(this)">Yellow</div>
        </div>

        <!-- Input and Button -->
        <div class="input-section">
            <input type="text" id="nameInput" placeholder="Enter your name">
            <button onclick="greetUser()">Greet</button>
        </div>

    </div>

    <script>
        // Updates the header greeting with the entered name
        function greetUser() {
            const name = document.getElementById("nameInput").value;
            const greeting = document.getElementById("greeting");

            if (name.trim() !== "") {
                greeting.innerText = "Hello, " + name;
            } else {
                greeting.innerText = "Hello";
            }
        }

        // Fills the clicked box with its corresponding color
        function fillColor(box) {
            const color = box.innerText.toLowerCase();
            box.style.backgroundColor = color;
            box.style.color = "#fff";
        }
    </script>

</body>
</html>
