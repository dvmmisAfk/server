<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>404 — Page Not Found</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background-color: #f2f2f2;
            padding: 12px 0;
            text-align: center;
            font-size: 16px;
            color: #333;
            border-bottom: 1px solid #ddd;
        }

        nav {
            background-color: #222;
            display: flex;
            justify-content: center;
            gap: 30px;
            padding: 10px 0;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            font-size: 14px;
        }

        nav a:hover { color: #f0c040; }

        .error-box {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 60px 20px;
        }

        .error-code {
            font-size: 80px;
            font-weight: bold;
            color: #ddd;
            line-height: 1;
        }

        h2 {
            font-size: 18px;
            color: #333;
            margin: 16px 0 8px;
        }

        p {
            font-size: 14px;
            color: #888;
            margin-bottom: 24px;
        }

        a.home-btn {
            padding: 8px 20px;
            background-color: #d3d3d3;
            border: 1px solid #bdbdbd;
            text-decoration: none;
            font-size: 14px;
            color: #333;
        }

        a.home-btn:hover { background-color: #c7c7c7; }
    </style>
</head>
<body>

    <header>LaundryLux</header>

    <nav>
        <a href="/home">Home</a>
        <a href="/about">About</a>
        <a href="/contact">Contact</a>
        <a href="/services">Services</a>
    </nav>

    <div class="error-box">
        <div class="error-code">404</div>
        <h2>Page Not Found</h2>
        <p>The page you're looking for doesn't exist or has been moved.</p>
        <a href="/home" class="home-btn">← Back to Home</a>
    </div>

</body>
</html>
